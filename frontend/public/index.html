<!DOCTYPE html>
<html>
<head>
    <title>WiFi Login</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>WiFi Login</h2>

    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="login()">Connect</button>

    <p id="msg"></p>
</div>

<script>
async function login() {

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('http://localhost:5000/api/captive/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    document.getElementById('msg').innerText = data.message;

    if (data.token) {
        document.getElementById('msg').innerText = "Access granted. You are connected.";
    }
}
</script>

</body>
</html>
